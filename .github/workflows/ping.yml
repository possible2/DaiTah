name: Ping Auto Recharge Cron

on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'   # kept as a backup, in case cron-job.org itself ever goes down
  workflow_dispatch:

jobs:
  visit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Playwright browser binary
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        run: npm install playwright

      - name: Install Chromium browser (only if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install system dependencies (always needed — fresh VM every run)
        run: npx playwright install-deps chromium

      - name: Ping once
        run: node ping.js
