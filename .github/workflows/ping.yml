name: Ping Auto Recharge Cron
on:
  schedule:
    - cron: '*/5 * * * *'   # every 15 min (GitHub's free minimum interval)
  workflow_dispatch:          # lets you trigger it manually too

jobs:
  visit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install playwright && npx playwright install --with-deps chromium
      - run: node ping.js
