name: Ping Auto Recharge Cron

on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'   # every 5 min, offset by 3 to dodge peak-load queueing at :00/:15/:30
  workflow_dispatch:

jobs:
  visit:
    runs-on: ubuntu-latest
    steps:
      - name: Ping every 2 minutes across a 10-minute window
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Ping $i of 5 ==="
            curl -s -o /dev/null -w "Status: %{http_code}\n" \
              --max-time 30 \
              "https://www.daitah.win/auto_recharge_cron.php"
            if [ $i -lt 5 ]; then sleep 120; fi
          done
