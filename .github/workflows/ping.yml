name: Ping Auto Recharge Cron

on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'   # every 5 min, offset by 3 to dodge peak-load queueing at :00/:15/:30
  workflow_dispatch:

jobs:
  visit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        run: npm install playwright

      - name: Install Chromium (only if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Ping every 2 minutes across a 10-minute window
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Ping $i of 5 ==="
            node ping.js
            if [ $i -lt 5 ]; then sleep 120; fi
          done
